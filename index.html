<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 24/7 Website Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
            border-radius: 10px;
            background-color: #1e293b;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Success!</h1>
        <p>My HTML, CSS, and JS website is officially live 24/7.</p>
        <button id="testBtn">Click Me</button>
        <p id="msg" style="margin-top: 15px; font-weight: bold; color: #10b981;"></p>
    </div>

    <script>
        document.getElementById('testBtn').addEventListener('click', function() {
            document.getElementById('msg').innerText = "🎉 JavaScript is working perfectly!";
        });
    </script>

</body>
</html>
